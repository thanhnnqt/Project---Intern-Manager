services:
  db:
    image: mysql:8.0
    container_name: intern_manager_db
    environment:
      MYSQL_ROOT_PASSWORD: codegym
      MYSQL_DATABASE: intern_manager
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pcodegym" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./BackEnd
    container_name: intern_manager_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/intern_manager
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: codegym
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./FrontEnd
    container_name: intern_manager_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
